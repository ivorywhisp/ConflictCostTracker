<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
    <title>{% block title %}Conflict Cost Tracker{% endblock %}</title>
</head>
<body>

    <nav class="site-nav">
        <div class="nav-inner">
            <a href="/" class="nav-brand">Conflict <span>Cost</span> Tracker</a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Conflicts</a>
                <a href="/about" class="nav-link {% if request.path == '/about' %}active{% endif %}">Methodology</a>
            </div>
        </div>
    </nav>

    <main>{% block main %}{% endblock %}</main>

    <footer class="site-footer">
        <div class="footer-inner">
            <nav class="footer-nav">
                <a href="/">Conflicts</a>
                <a href="/about">Methodology</a>
            </nav>
            <p>Data sourced from Kiel Institute, UN OCHA, World Bank, IMF, Reuters, and ACLED.</p>
            <p>All figures are estimates for educational purposes. This site does not take political positions.</p>
        </div>
    </footer>

</body>
</html>
